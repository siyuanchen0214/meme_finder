name: 知乎每日速览

on:
  schedule:
    # GitHub Actions uses UTC. 22:00 UTC ~= 06:00 (UTC+8) next day.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        env:
          ZHIHU_ACCESS_SECRET: ${{ secrets.ZHIHU_ACCESS_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${ZHIHU_ACCESS_SECRET:-}" ]; then
            echo "::error::Missing Actions secret: ZHIHU_ACCESS_SECRET — add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build & email the daily document
        env:
          ZHIHU_ACCESS_SECRET: ${{ secrets.ZHIHU_ACCESS_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: |
          # Email only when SMTP is configured; always write the file to digests/.
          if [ -n "${SMTP_HOST:-}" ] && [ -n "${EMAIL_TO:-}" ]; then
            python -m meme_finder zhihu-daily --email --no-open
          else
            python -m meme_finder zhihu-daily --no-open
          fi

      - name: Commit the generated document
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          # Persist the dedupe store across daily runs (force-add: .state/ is gitignored locally).
          git add -f .state/zhihu_seen.json || true
          if git diff --cached --quiet; then
            echo "No new document to commit."
          else
            git commit -m "知乎每日速览 $(date -u +%Y-%m-%d)"
            git push
          fi
