name: Daily Humor Digest

on:
  schedule:
    # GitHub Actions uses UTC. Adjust if your local time is different.
    # 22:00 UTC ~= 06:00 (UTC+8) next day.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # `run` defaults to transcription_mode=auto; short/missing captions trigger OpenAI STT,
      # which uses yt-dlp FFmpegExtractAudio — ffmpeg is not on ubuntu-latest by default.
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -n 1

      - name: Cache memory state
        uses: actions/cache@v4
        with:
          path: .state
          key: meme-finder-state-v1-${{ github.run_id }}
          restore-keys: |
            meme-finder-state-v1-

      - name: Write sources.yaml (from secret)
        env:
          SOURCES_YAML: ${{ secrets.SOURCES_YAML }}
        run: |
          if [ -z "$SOURCES_YAML" ]; then
            echo "Missing SOURCES_YAML secret. Add it in GitHub Actions secrets."
            exit 1
          fi
          printf "%s" "$SOURCES_YAML" > sources.yaml

      # Fail fast with exact secret names (GitHub substitutes missing secrets as empty).
      - name: Check email & OpenAI secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          ok=1
          for var in SMTP_HOST SMTP_PORT SMTP_USERNAME SMTP_PASSWORD EMAIL_FROM EMAIL_TO OPENAI_API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing or empty Actions secret: $var — add it under Repo Settings → Secrets and variables → Actions (name must match exactly)."
              ok=0
            fi
          done
          if [ "$ok" -eq 0 ]; then
            exit 1
          fi

      - name: Run digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          OPENAI_WHISPER_MODEL: ${{ secrets.OPENAI_WHISPER_MODEL }}
        run: |
          python -m meme_finder run --sources sources.yaml

